<!--This will be the Log in page for Roomly-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In | Roomly</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- Navbar -->
    <header>
        <div class="logoRoomly">
            <img src="{{ url_for('static', filename='logoRoomly.png') }}" alt="Roomly Icon" class="header-icon">
            Roomly
            </div>
        <nav>
            <a href="{{ url_for('views.home') }}">Home</a>
            <a href="{{ url_for('views.browse') }}">Browse</a>
            <a href="{{ url_for('views.list_property') }}">List Property</a>
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.signup') }}" class="signup-btn">Sign Up</a> 
        </nav>
    </header>

     <!-- Login Section -->
    <section class="hero login-background">
        <div class="login-container">
            <h2>Log In</h2>
            <form action="{{ url_for('auth.login') }}" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
        </div>
    </section>
