<!-- This is the Sign up page for Roomly -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Roomly</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- Navbar -->
    <header>
        <div class="logoRoomly">
            <img src="{{ url_for('static', filename='logoRoomly.png') }}" alt="Roomly Icon" class="header-icon">
            Roomly
            </div>
        <nav>
            <a href="{{ url_for('views.home') }}">Home</a>
            <a href="{{ url_for('views.browse') }}">Browse</a>
            <a href="{{ url_for('views.list_property') }}">List Property</a>
            <a href="{{ url_for('auth.login') }}">Login</a> 
        </nav>
    </header>

     <!-- Signup Section -->
    <section class="hero signup-background">
        <div class="signup-container">
            <h2>Sign Up</h2>
            <form action="{{ url_for('auth.signup') }}" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
    </section>
