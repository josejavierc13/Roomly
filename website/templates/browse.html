<!--This is the browse page-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse | Roomly</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <!-- Navbar -->
    <header>
        <div class="logoRoomly">
            <img src="{{ url_for('static', filename='logoRoomly.png') }}" alt="Roomly Icon" class="header-icon">
            Roomly
            </div>
        <nav>
            <a href="{{ url_for('views.home') }}">Home</a>
            <a href="{{ url_for('views.browse') }}">Browse</a>
            <a href="{{ url_for('views.list_property') }}">List Property</a>
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.signup') }}" class="signup-btn">Sign Up</a> 
        </nav>
    </header>

     <!-- Browse Section -->
    <section class="browse-container">
        <h2>Browse Properties</h2>
        <!-- Filter Section -->
        <div class="filter-section">
            <h3>Filter by:</h3>
            <form method="GET" action="{{ url_for('views.browse') }}">
                <div class="filter-options">
                    <label><input type="radio" name="filter" value="price_low_high" {% if selected_filter == 'price_low_high' %}checked{% endif %}> Price: Low to High</label>
                    <label><input type="radio" name="filter" value="price_high_low" {% if selected_filter == 'price_high_low' %}checked{% endif %}> Price: High to Low</label>
                    <label><input type="radio" name="filter" value="newest" {% if selected_filter == 'newest' %}checked{% endif %}> Newest Listings</label>
                    <label><input type="radio" name="filter" value="oldest" {% if selected_filter == 'oldest' %}checked{% endif %}> Oldest Listings</label>
                </div>
                <button type="submit">Apply Filter</button>
            </form>
        </div>

        <!-- Property Listings -->
        <div class="property-listings">
            {% for property in properties %}
                <div class="property-card">
                    <img src="{{ property.image_url }}" alt="{{ property.title }}">
                    <h3>{{ property.title }}</h3>
                    <p>{{ property.description }}</p>
                    <p>Price: ${{ property.price }}</p>
                    <a href="{{ url_for('views.property_detail', property_id=property.id) }}" class="view-details-btn">View Details</a>
                </div>
            {% endfor %}
        </div>
    </section>
</body>
</html>
